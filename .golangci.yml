version: "2"

run:
  timeout: 5m
  go: '1.25'
  allow-parallel-runners: true

formatters:
  enable:
    - gofmt
    - goimports

linters:
  default: none
  enable:
    - dupl
    - errcheck
    - ginkgolinter
    - goconst
    - gocyclo
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    revive:
      rules:
        - name: comment-spacings
    lll:
      line-length: 200
  exclusions:
    # issues.exclude-use-default: false — do not apply default exclusion presets
    presets: []
    rules:
      - path: api/*
        linters:
          - lll
      - path: internal/*
        linters:
          - dupl
          - lll
